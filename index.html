<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="theme-color" content="#2D6CB5" />
<meta name="mobile-web-app-capable" content="yes" />
<title>PinturaStock — Software de Inventario</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:        #dde4ee;
    --bg-2:      #cfd9e8;
    --bg-card:   #ffffff;
    --line:      #c0ccdd;
    --line-2:    #a9b8cd;
    --ink:       #131a24;
    --ink-2:     #3a4654;
    --ink-3:     #6b7889;
    --ink-4:     #9aa6b6;
    --accent:    oklch(0.52 0.13 250);   /* azul */
    --accent-2:  oklch(0.58 0.13 250);
    --accent-bg: oklch(0.95 0.03 250);
    --good:      oklch(0.55 0.11 200);
    --good-bg:   oklch(0.95 0.04 210);
    --warn:      oklch(0.68 0.13 75);
    --warn-bg:   oklch(0.95 0.06 80);
    --bad:       oklch(0.55 0.16 25);
    --bad-bg:    oklch(0.95 0.05 25);
    --info:      oklch(0.52 0.13 250);
    --info-bg:   oklch(0.95 0.03 250);
    --radius:    8px;
    --radius-sm: 5px;
    --shadow:    0 1px 0 rgba(20,18,12,.04), 0 1px 2px rgba(20,18,12,.05);
    --shadow-lg: 0 6px 24px -8px rgba(20,18,12,.18), 0 2px 6px rgba(20,18,12,.06);
    --font:      "DM Sans", system-ui, sans-serif;
    --serif:     "Newsreader", Georgia, serif;
    --mono:      "JetBrains Mono", ui-monospace, monospace;
  }
  html[data-theme="dark"] {
    --bg:        #0d1219;
    --bg-2:      #141c27;
    --bg-card:   #161f2b;
    --line:      #24303f;
    --line-2:    #324154;
    --ink:       #eaf1fa;
    --ink-2:     #b3c1d2;
    --ink-3:     #79899c;
    --ink-4:     #51606f;
    --accent-bg: oklch(0.30 0.06 250);
    --good-bg:   oklch(0.28 0.04 210);
    --warn-bg:   oklch(0.30 0.06 80);
    --bad-bg:    oklch(0.30 0.05 25);
    --info-bg:   oklch(0.28 0.05 250);
    --shadow:    0 1px 0 rgba(0,0,0,.30), 0 1px 2px rgba(0,0,0,.40);
    --shadow-lg: 0 6px 24px -8px rgba(0,0,0,.60), 0 2px 6px rgba(0,0,0,.30);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: var(--font); -webkit-font-smoothing: antialiased; font-size: 14px; line-height: 1.45; }
  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* App shell */
  .app { display: grid; grid-template-columns: 232px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    padding: 18px 14px;
    display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh;
    overflow-y: auto; overflow-x: hidden;
  }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .brand { display: flex; align-items: center; gap: 10px; padding: 8px 8px 18px; }
  .brand-mark {
    width: 28px; height: 28px; border-radius: 7px;
    background: var(--bg-card);
    position: relative; overflow: hidden;
    box-shadow: var(--shadow), inset 0 0 0 1px rgba(255,255,255,.45);
  }
  .brand-mark img {
    display: block;
    width: 100%;
    height: 100%;
  }
  .brand-name { font-weight: 700; letter-spacing: -0.01em; font-size: 15px; }
  .brand-sub { font-size: 11px; color: var(--ink-3); letter-spacing: 0.04em; text-transform: uppercase; }

  .nav-label { font-size: 11px; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.08em; padding: 14px 8px 6px; }
  .nav-item {
    display: grid; grid-template-columns: 20px 1fr auto; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: var(--radius-sm);
    color: var(--ink-2); text-decoration: none;
    border: 1px solid transparent;
    background: transparent;
    width: 100%; text-align: left; font-size: 13.5px;
  }
  .nav-item:hover { background: rgba(0,0,0,.03); color: var(--ink); }
  .nav-item.active {
    background: var(--bg-card);
    border-color: var(--line);
    color: var(--ink);
    box-shadow: var(--shadow);
  }
  .nav-item .ic { color: var(--ink-3); }
  .nav-item.active .ic { color: var(--accent); }
  .nav-item .badge {
    font-size: 11px; color: var(--ink-3);
    font-family: var(--mono);
  }
  .sidebar-foot { margin-top: auto; padding: 10px 8px; border-top: 1px dashed var(--line); display:flex; align-items:center; gap:10px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: oklch(0.7 0.08 60); color: white; display: grid; place-items: center; font-weight: 600; font-size: 12px; }

  /* Main */
  .main { display: flex; flex-direction: column; min-width: 0; }
  .topbar {
    height: 56px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px; padding: 0 22px;
    background: var(--bg);
    position: sticky; top: 0; z-index: 10;
  }
  .crumbs { display:flex; align-items:center; gap:8px; font-size: 13px; color: var(--ink-3); }
  .crumbs .sep { color: var(--ink-4); }
  .crumbs .cur { color: var(--ink); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: var(--radius-sm); padding: 6px 10px; width: 280px;
    color: var(--ink-3);
  }
  .search input { border: 0; outline: 0; background: transparent; flex: 1; }
  .kbd { font-family: var(--mono); font-size: 11px; color: var(--ink-3); border: 1px solid var(--line); padding: 1px 5px; border-radius: 4px; background: var(--bg); }

  .content { padding: 24px 28px 64px; max-width: 1400px; width: 100%; align-self: flex-start; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; margin-bottom: 22px; flex-wrap: wrap;}
  .page-title { font-size: 24px; letter-spacing: -0.02em; font-weight: 600; margin: 0; }
  .page-sub { color: var(--ink-3); font-size: 13.5px; margin-top: 4px; max-width: 64ch;}

  /* buttons */
  .btn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg-card); color: var(--ink); font-size: 13px; font-weight: 500; }
  .btn:hover { border-color: var(--line-2); }
  .btn.primary { background: var(--ink); color: #fff; border-color: var(--ink); }
  .btn.primary:hover { background: #000; }
  .btn.accent { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn.accent:hover { background: var(--accent-2); border-color: var(--accent-2); }
  .btn.ghost { background: transparent; border-color: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: rgba(0,0,0,.04); }
  .btn.sm { padding: 4px 8px; font-size: 12px; }
  .btn.danger { color: var(--bad); }

  /* card */
  .card { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
  .card-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display:flex; align-items:center; gap: 10px; }
  .card-head h3 { margin: 0; font-size: 14px; font-weight: 600; }
  .card-head .meta { color: var(--ink-3); font-size: 12px; }
  .card-body { padding: 16px; }

  /* tables */
  table.t { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.t th { text-align: left; font-weight: 500; color: var(--ink-3); padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 12px; letter-spacing: 0.02em; background: var(--bg-2); position: sticky; top: 0;}
  table.t td { padding: 12px 14px; border-bottom: 1px solid var(--line); vertical-align: middle; }
  table.t tr:last-child td { border-bottom: 0; }
  table.t tr:hover td { background: oklch(0.98 0.01 60); }
  .num { font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .muted { color: var(--ink-3); }

  /* pills / badges */
  .pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11.5px; font-weight: 500; padding: 2px 8px; border-radius: 999px; background: var(--bg-2); color: var(--ink-2); border: 1px solid var(--line); }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); }
  .pill.good   { background: var(--good-bg); color: var(--good);  border-color: transparent; }
  .pill.good .dot { background: var(--good); }
  .pill.warn   { background: var(--warn-bg); color: var(--warn);  border-color: transparent; }
  .pill.warn .dot { background: var(--warn); }
  .pill.bad    { background: var(--bad-bg);  color: var(--bad);   border-color: transparent; }
  .pill.bad .dot { background: var(--bad); }
  .pill.info   { background: var(--info-bg); color: var(--info);  border-color: transparent; }
  .pill.info .dot { background: var(--info); }
  .pill.accent { background: var(--accent-bg); color: var(--accent); border-color: transparent; }
  .pill.accent .dot { background: var(--accent); }

  /* form */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--ink-3); font-weight: 500; }
  .input, .select, .textarea {
    border: 1px solid var(--line); background: var(--bg-card); border-radius: var(--radius-sm);
    padding: 7px 10px; outline: 0; color: var(--ink); font-size: 13.5px;
  }
  .input:focus, .select:focus, .textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }

  /* kpi */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .kpi { background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
  .kpi { position: relative; overflow: hidden; }
  .kpi::before { content: ""; position: absolute; inset: 0 0 auto 0; height: 3px; background: linear-gradient(90deg, var(--accent), oklch(0.70 0.12 165), oklch(0.78 0.12 70)); opacity: .85; }
  .kpi .label { font-size: 12px; color: var(--ink-3); letter-spacing: 0.02em; text-transform: uppercase; }
  .kpi .val { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-top: 6px; font-family: var(--mono); font-variant-numeric: tabular-nums;}
  .kpi .trend { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; margin-top: 8px; color: var(--ink-3);}
  .kpi .trend .delta.up { color: var(--good); }
  .kpi .trend .delta.down { color: var(--bad); }

  /* progress */
  .bar { height: 6px; background: var(--bg-2); border-radius: 999px; overflow: hidden; }
  .bar > span { display: block; height: 100%; background: var(--accent); border-radius: 999px; }
  .bar.good > span { background: var(--good); }
  .bar.warn > span { background: var(--warn); }
  .bar.bad > span { background: var(--bad); }

  /* modal */
  .modal-bg { position: fixed; inset: 0; background: rgba(20,18,12,.35); display: grid; place-items: center; z-index: 50; backdrop-filter: blur(2px); }
  .modal { background: var(--bg-card); border-radius: 10px; border: 1px solid var(--line); width: min(620px, 92vw); box-shadow: var(--shadow-lg); overflow: hidden; max-height: 90vh; display: flex; flex-direction: column; }
  .modal h2 { margin: 0; font-size: 16px; font-weight: 600;}
  .modal .modal-head { padding: 16px 18px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 10px; flex-shrink: 0;}
  .modal .modal-body { padding: 18px; overflow-y: auto; }
  .modal .modal-foot { padding: 14px 18px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 8px; background: var(--bg-2); flex-shrink: 0;}

  /* toast */
  .toasts { position: fixed; right: 18px; bottom: 18px; display: flex; flex-direction: column; gap: 8px; z-index: 60; }
  .toast { background: var(--ink); color: white; padding: 10px 14px; border-radius: 6px; font-size: 13px; display:flex; align-items:center; gap: 10px; box-shadow: var(--shadow-lg); animation: slideIn .25s ease; }
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: none; opacity: 1; } }

  /* tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin-bottom: 16px; }
  .tab { padding: 8px 12px; border: 0; background: transparent; color: var(--ink-3); font-size: 13px; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }

  /* swatch */
  .swatch { width: 18px; height: 18px; border-radius: 4px; border: 1px solid rgba(0,0,0,.1); display: inline-block; vertical-align: middle; margin-right: 8px; }

  /* bars chart */
  .chart-bars { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 6px; align-items: end; height: 140px; padding: 8px 0; }
  .chart-bars .col { display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end;}
  .chart-bars .col .bar2 { width: 70%; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; }
  .chart-bars .col .lab { font-size: 10.5px; color: var(--ink-3); font-family: var(--mono);}

  .live-feed { display: grid; gap: 10px; }
  .feed-item { display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; align-items: start; padding: 10px 0; border-bottom: 1px solid var(--line); }
  .feed-dot { width: 28px; height: 28px; border-radius: 8px; display: grid; place-items: center; background: var(--accent-bg); color: var(--accent); }
  .feed-title { font-weight: 600; font-size: 13px; }
  .feed-meta { color: var(--ink-3); font-size: 11.5px; margin-top: 2px; }
  .flow-rail { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; margin: 14px 0; }
  .flow-step { min-height: 64px; border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: var(--bg-card); display: flex; flex-direction: column; gap: 6px; justify-content: center; }
  .flow-step.active { border-color: var(--accent); background: var(--accent-bg); color: var(--accent); box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--accent), transparent 82%); }
  .flow-step.warn { border-color: transparent; background: var(--warn-bg); color: var(--warn); }
  .flow-step.good { border-color: transparent; background: var(--good-bg); color: var(--good); }
  .flow-step .step-title { font-size: 12px; font-weight: 700; }
  .flow-step .step-sub { font-size: 11px; color: var(--ink-3); }
  .stock-meter { height: 8px; border-radius: 999px; background: var(--bg-2); overflow: hidden; border: 1px solid var(--line); }
  .stock-meter span { display: block; height: 100%; border-radius: inherit; background: linear-gradient(90deg, var(--bad), var(--warn), var(--good)); }
  .kanban { display: grid; grid-template-columns: repeat(4, minmax(180px, 1fr)); gap: 12px; }
  .kanban-col { border: 1px solid var(--line); border-radius: 8px; background: color-mix(in oklch, var(--bg-card), var(--bg-2) 35%); min-height: 180px; }
  .kanban-head { padding: 10px 12px; border-bottom: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; font-weight: 700; font-size: 12px; }
  .kanban-card { margin: 10px; padding: 10px; border-radius: 7px; background: var(--bg-card); border: 1px solid var(--line); box-shadow: var(--shadow); }
  .kanban-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .touch-bar { display: none; position: sticky; bottom: 0; z-index: 30; background: color-mix(in oklch, var(--bg-card), transparent 4%); border-top: 1px solid var(--line); padding: 8px; gap: 8px; justify-content: space-around; backdrop-filter: blur(10px); }
  .touch-bar button { min-height: 44px; flex: 1; justify-content: center; }

  /* responsive */
  @media (max-width: 700px) {
    .app { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .flow-rail { grid-template-columns: 1fr; }
    .kanban { grid-template-columns: 1fr; }
    .touch-bar { display: flex; }
  }

  /* utility */
  .row { display: flex; align-items: center; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 10px; }
  .gap-16 { gap: 16px; } .gap-12 { gap: 12px; } .gap-8 { gap: 8px; }
  .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mt-24 { margin-top: 24px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-12-8 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
  hr.sep { border: 0; border-top: 1px solid var(--line); margin: 16px 0; }

  /* ═══════════ DESIGN ENHANCEMENTS ═══════════ */

  /* Smooth global transitions */
  .nav-item, .btn, .kpi, .card, .pill, .chip, table.t tr, .swatch, input, select { transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .2s ease, transform .15s ease; }

  /* Serif page titles + richer type */
  .page-title { font-family: var(--serif); font-weight: 500; letter-spacing: -0.01em; }
  .card-head h3 { letter-spacing: -0.005em; }

  /* Blueprint texture on content area */
  .content {
    background-image:
      linear-gradient(rgba(120,110,90,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,110,90,.035) 1px, transparent 1px);
    background-size: 26px 26px;
    background-position: -1px -1px;
  }
  html[data-theme="dark"] .content {
    background-image:
      linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  }

  /* Hover lift */
  .kpi.lift:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
  .lift-card { transition: transform .18s ease, box-shadow .2s ease; }
  .lift-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  table.t tr.lift-row:hover { box-shadow: inset 3px 0 0 var(--accent); }

  /* Stagger fade-in */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  .stagger > * { animation: fadeUp .42s cubic-bezier(.22,.61,.36,1) backwards; }
  .stagger > *:nth-child(1) { animation-delay: .02s; }
  .stagger > *:nth-child(2) { animation-delay: .07s; }
  .stagger > *:nth-child(3) { animation-delay: .12s; }
  .stagger > *:nth-child(4) { animation-delay: .17s; }
  .stagger > *:nth-child(5) { animation-delay: .22s; }
  .stagger > *:nth-child(6) { animation-delay: .27s; }
  .stagger > *:nth-child(7) { animation-delay: .32s; }
  .stagger > *:nth-child(8) { animation-delay: .37s; }

  /* Page transition */
  @keyframes pageIn { from { opacity: 0; transform: translateY(8px) scale(.995); } to { opacity: 1; transform: none; } }
  .page-anim { animation: pageIn .32s cubic-bezier(.22,.61,.36,1); }

  /* Skeleton loaders */
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skel {
    background: linear-gradient(90deg, var(--bg-2) 25%, var(--line) 37%, var(--bg-2) 63%);
    background-size: 200% 100%;
    animation: shimmer 1.3s ease-in-out infinite;
    border-radius: 5px;
  }

  /* Toast progress + undo */
  .toast { position: relative; overflow: hidden; }
  .toast .toast-prog { position: absolute; left: 0; bottom: 0; height: 2px; background: var(--accent); animation: toastProg linear forwards; }
  @keyframes toastProg { from { width: 100%; } to { width: 0%; } }
  .toast .undo-btn { background: rgba(255,255,255,.16); border: 0; color: #fff; padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .toast .undo-btn:hover { background: rgba(255,255,255,.28); }

  /* Sparkline */
  .spark { display: inline-block; vertical-align: middle; }

  /* Paint can (tarro) */
  .can-wrap { perspective: 600px; }
  .can { transition: transform .25s ease; }
  .lift-card:hover .can { transform: rotateX(4deg) translateY(-2px); }

  /* Filter chips removable */
  .fchip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 6px 4px 10px; border-radius: 999px; background: var(--accent-bg); color: var(--accent); font-size: 12px; font-weight: 500; }
  .fchip button { border: 0; background: transparent; color: inherit; cursor: pointer; display: grid; place-items: center; border-radius: 50%; width: 16px; height: 16px; }
  .fchip button:hover { background: rgba(0,0,0,.12); }

  /* Hover preview card */
  .hovcard { position: fixed; z-index: 90; background: var(--bg-card); border: 1px solid var(--line-2); border-radius: 8px; box-shadow: var(--shadow-lg); padding: 12px 14px; width: 260px; pointer-events: none; animation: fadeUp .14s ease; }

  /* Drag handle */
  .drag-row { cursor: grab; }
  .drag-row.dragging { opacity: .4; }
  .drag-over-top { box-shadow: inset 0 2px 0 var(--accent); }
  .drag-over-bot { box-shadow: inset 0 -2px 0 var(--accent); }

  body.present .sidebar, body.present .topbar { display: none !important; }

  .heat-cell { rx: 2; transition: opacity .15s ease; }
  .heat-cell:hover { stroke: var(--ink); stroke-width: 1; }
